networks:
  mesh:
    internal: true
  tobby-egress: {}

volumes:
  sshchat_data:
  hanb_data:
  tobby_data:
  proxy_key: {}
  wordle_data:
  asshteroids_data:

services:
  entry-menu:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${SSH_PORT:-6922}:2222"
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ./docker/config.yaml:/etc/sshland/config.yaml:ro
      - proxy_key:/proxy_key
    environment:
      SSH_HOST_KEY_PATH: /data/host_key
      SSH_LISTEN_ADDR: "0.0.0.0:2222"
      CONFIG_PATH: /etc/sshland/config.yaml
      PROXY_KEY_PATH: /proxy_key/key
      LOGTO_ENDPOINT: "${LOGTO_ENDPOINT:-}"
      LOGTO_APP_ID: "${LOGTO_APP_ID:-}"
      LOGTO_APP_SECRET: "${LOGTO_APP_SECRET:-}"
      LOGTO_REDIRECT_URI: "${LOGTO_REDIRECT_URI:-}"
      HTTP_LISTEN_ADDR: "${HTTP_LISTEN_ADDR:-0.0.0.0:8080}"
      IDENTITIES_DIR: "/data/identities"
    labels:
      # Without this, Traefik v3 picks an internal-only network IP (mesh/default)
      # and times out (30s 504). This pins it to the shared external network.
      - traefik.docker.network=fwwkgcoo0ssoskssow888cww
    networks:
      - default
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 200

  wordle:
    build:
      context: .
      dockerfile: docker/wordle/Dockerfile
    volumes:
      - wordle_data:/app/sshwordle/app
    networks:
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 50

  sshchat:
    build:
      context: .
      dockerfile: docker/sshchat/Dockerfile
    ports:
      - "${SSHCHAT_PORT:-2022}:2022"
    volumes:
      - sshchat_data:/data
    networks:
      - default
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 100

  hanb:
    build:
      context: .
      dockerfile: docker/hanb/Dockerfile
    environment:
      SSH_HOST_KEY_PATH: /tmp/sshland/host_key
      SSH_LISTEN_ADDR: "0.0.0.0:2222"
      PROXY_KEY_PATH: /proxy_key/key
    volumes:
      - hanb_data:/data
      - proxy_key:/proxy_key:ro
    tmpfs:
      - /tmp
    read_only: true
    networks:
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 100

  tobby:
    build:
      context: .
      dockerfile: docker/tobby/Dockerfile
    environment:
      SSH_HOST_KEY_PATH: /tmp/sshland/host_key
      SSH_LISTEN_ADDR: "0.0.0.0:2222"
      PROXY_KEY_PATH: /proxy_key/key
    volumes:
      - tobby_data:/data
      - proxy_key:/proxy_key:ro
    tmpfs:
      - /tmp
      - /home/sshland
    read_only: true
    networks:
      - mesh
      - tobby-egress
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 100

  asshteroids:
    build:
      context: .
      dockerfile: docker/asshteroids/Dockerfile
    environment:
      SSH_HOST_KEY: /var/lib/asshteroids/host_key
      SSH_PORT: "2222"
    volumes:
      - asshteroids_data:/var/lib/asshteroids
    read_only: true
    networks:
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"
          pids: 50

  sshtron:
    build:
      context: .
      dockerfile: docker/sshtron/Dockerfile
    environment:
      SSH_PORT: "2022"
    tmpfs:
      - /tmp
    read_only: true
    networks:
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"
          pids: 50
