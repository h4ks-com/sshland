networks:
  mesh:
    internal: true
  tobby-egress: {}

volumes:
  sshchat_data:
  hanb_data:
  tobby_data:

services:
  entry-menu:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${SSH_PORT:-6922}:22"
    volumes:
      # Bind-mount the whole data directory. entry-menu auto-generates host_key
      # inside it on first start. Place authorized_keys here to enable named users.
      - ${DATA_DIR:-./data}:/data
      - ./docker/config.yaml:/etc/sshland/config.yaml:ro
    environment:
      SSH_HOST_KEY_PATH: /data/host_key
      AUTHORIZED_KEYS_PATH: /data/authorized_keys
      CONFIG_PATH: /etc/sshland/config.yaml
      SSH_LISTEN_ADDR: "0.0.0.0:22"
    networks:
      - default
      - mesh
    restart: always

  wordle:
    build:
      context: .
      dockerfile: docker/wordle/Dockerfile
    networks:
      - mesh
    restart: always

  sshchat:
    build:
      context: .
      dockerfile: docker/sshchat/Dockerfile
    volumes:
      - sshchat_data:/data
    networks:
      - mesh
    restart: always

  hanb:
    build:
      context: .
      dockerfile: docker/hanb/Dockerfile
    environment:
      SSH_HOST_KEY_PATH: /data/host_key
      SSH_LISTEN_ADDR: "0.0.0.0:22"
    volumes:
      - hanb_data:/data
    networks:
      - mesh
    restart: always

  tobby:
    build:
      context: .
      dockerfile: docker/tobby/Dockerfile
    environment:
      SSH_HOST_KEY_PATH: /data/host_key
      SSH_LISTEN_ADDR: "0.0.0.0:22"
    volumes:
      - tobby_data:/data
    networks:
      - mesh
      - tobby-egress
    restart: always
