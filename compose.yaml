networks:
  mesh:
    internal: true
  tobby-egress: {}

volumes:
  sshchat_data:
  hanb_data:
  tobby_data:
  proxy_key: {}

services:
  entry-menu:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${SSH_PORT:-6922}:2222"
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ./docker/config.yaml:/etc/sshland/config.yaml:ro
      - proxy_key:/proxy_key
    environment:
      SSH_HOST_KEY_PATH: /data/host_key
      SSH_LISTEN_ADDR: "0.0.0.0:2222"
      CONFIG_PATH: /etc/sshland/config.yaml
      PROXY_KEY_PATH: /proxy_key/key
    networks:
      - default
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 200

  wordle:
    build:
      context: .
      dockerfile: docker/wordle/Dockerfile
    networks:
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 50

  sshchat:
    build:
      context: .
      dockerfile: docker/sshchat/Dockerfile
    volumes:
      - sshchat_data:/data
    networks:
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 100

  hanb:
    build:
      context: .
      dockerfile: docker/hanb/Dockerfile
    environment:
      SSH_HOST_KEY_PATH: /tmp/sshland/host_key
      SSH_LISTEN_ADDR: "0.0.0.0:2222"
      PROXY_KEY_PATH: /proxy_key/key
    volumes:
      - hanb_data:/data
      - proxy_key:/proxy_key:ro
    networks:
      - mesh
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 100

  tobby:
    build:
      context: .
      dockerfile: docker/tobby/Dockerfile
    environment:
      SSH_HOST_KEY_PATH: /tmp/sshland/host_key
      SSH_LISTEN_ADDR: "0.0.0.0:2222"
      PROXY_KEY_PATH: /proxy_key/key
    volumes:
      - tobby_data:/data
      - proxy_key:/proxy_key:ro
    networks:
      - mesh
      - tobby-egress
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
          pids: 100
